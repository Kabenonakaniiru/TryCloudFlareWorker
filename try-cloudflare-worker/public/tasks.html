<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスク管理 - ソシャゲツール</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <h1>📋 ソシャゲタスク管理</h1>
  <nav>
    <a href="/" class="btn-link">← メインへ戻る</a>
  </nav>

  <section class="task-form">
    <div class="form-group">
      <label for="task-title">タスク名</label>
      <input type="text" id="task-title" placeholder="例: デイリークエスト">
    </div>
    <div class="form-group">
      <label for="task-start">開始</label>
      <input type="datetime-local" id="task-start">
    </div>
    <div class="form-group">
      <label for="task-end">終了</label>
      <input type="datetime-local" id="task-end">
    </div>
    <div class="form-group">
      <label for="task-interval">繰り返し</label>
      <select id="task-interval">
        <option value="none">なし</option>
        <option value="daily">毎日</option>
        <option value="weekly">毎週</option>
        <option value="monthly">毎月</option>
      </select>
    </div>
    <button type="button" id="add-task-button">追加する</button>
  </section>

  <table>
    <thead>
      <tr>
        <th>タイトル</th>
        <th>期間</th>
        <th>繰り返し</th>
        <th>状態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="task-list"></tbody>
  </table>

  <script>
    // ページ読み込み完了後に実行
    document.addEventListener('DOMContentLoaded', () => {
      const taskBtn = document.getElementById('add-task-button');
      const taskList = document.getElementById('task-list');

      // 1. タスク一覧の読み込み関数
      async function loadTasks() {
        try {
          const resp = await fetch('/api/tasks');
          if (!resp.ok) throw new Error('一覧の取得に失敗しました');
          const tasks = await resp.json();

          taskList.innerHTML = '';
          tasks.forEach(task => {
            const row = `
              <tr>
                <td><strong>${task.title}</strong></td>
                <td>${(task.start_at || '-').replace('T', ' ')} <br> ${(task.end_at || '-').replace('T', ' ')}</td>
                <td>${task.interval}</td>
                <td><span class="status-badge">${task.status}</span></td>
                <td><button class="delete-btn" onclick="deleteTask(${task.id})">削除</button></td>
              </tr>
            `;
            taskList.insertAdjacentHTML('beforeend', row);
          });
        } catch (err) {
          console.error('Load Error:', err);
        }
      }

      // 2. 追加ボタンのイベント
      taskBtn.addEventListener('click', async () => {
        console.log('Button clicked!'); // デバッグ用ログ

        const payload = {
          title: document.getElementById('task-title').value,
          start_at: document.getElementById('task-start').value,
          end_at: document.getElementById('task-end').value,
          interval: document.getElementById('task-interval').value
        };

        if (!payload.title) {
          alert('タスク名を入力してください');
          return;
        }

        try {
          const resp = await fetch('/api/add-task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (resp.ok) {
            document.getElementById('task-title').value = ''; // 入力欄クリア
            await loadTasks(); // リロードせずに再描画
          } else {
            const errorText = await resp.text();
            alert('保存に失敗しました: ' + errorText);
          }
        } catch (err) {
          console.error('Fetch Error:', err);
          alert('通信エラーが発生しました');
        }
      });

      // 初回読み込み
      loadTasks();
    });

    // 削除用関数（グローバルに配置）
    async function deleteTask(id) {
      if (!confirm('このタスクを削除してもよろしいですか？')) return;

      try {
        const resp = await fetch('/api/delete-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });

        if (resp.ok) {
          // 削除に成功したら一覧を再読み込み（loadTasksはDOMContentLoaded内にあるので、必要に応じて外に出すか、location.reload()を使用）
          location.reload();
        } else {
          alert('削除に失敗しました');
        }
      } catch (err) {
        console.error('Delete Error:', err);
      }
    }
  </script>
</body>

</html>
